stages:
  - deploy

variables:
  GIT_DEPTH: "0"

deploy_dotfiles:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git
    - chmod 600 "$SSH_PRIVATE_KEY"
  script:
    - |
      # Check if sudoers/ files changed in this commit
      if git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null; then
        SUDOERS_CHANGED="false"
      else
        SUDOERS_CHANGED="true"
      fi
      echo "Sudoers changed: $SUDOERS_CHANGED"

      # Deploy to docker-prod-1
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.24 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)"

      # Deploy to endurance
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.30 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)"

      # Deploy to ranger0
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.16 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)"

      # Deploy to gargantua (skip if offline)
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=5 ecloaiza@192.168.5.110 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)" \
        || echo "⚠️  gargantua offline, skipping deployment"

      # Deploy to ranger1
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.35 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)"

      # Deploy to trainerroad2 (skip if offline)
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no -o ConnectTimeout=5 ecloaiza@192.168.5.176 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)" \
        || echo "⚠️  trainerroad2 offline, skipping deployment"

      # Deploy to tars
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.127 \
        "cd ~/devops/github/linux_dotfiles && git fetch origin && git reset --hard origin/main && \
        (git diff --quiet HEAD~1 HEAD -- sudoers/ 2>/dev/null && true || sudo /home/ecloaiza/devops/github/linux_dotfiles/scripts/sync-sudoers-ci.sh)"
  only:
    - main
